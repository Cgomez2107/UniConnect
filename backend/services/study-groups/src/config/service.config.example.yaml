service:
  name: study-groups
  port: 3101
  apiPrefix: /api/v1
  requestTimeoutMs: 15000
  gracefulShutdownMs: 15000

security:
  jwtIssuer: ${JWT_ISSUER}
  jwtAudience: ${JWT_AUDIENCE}
  requireAuthByDefault: true

database:
  provider: postgres
  host: ${DB_HOST}
  port: ${DB_PORT}
  dbName: ${DB_NAME}

observability:
  logs: structured-json
  includeRequestId: true
  metricsEnabled: true
