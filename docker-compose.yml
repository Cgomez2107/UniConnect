# ============================================================================
# docker-compose.yml - Stack local: backend + frontend + db
# Ubicacion: repo root
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: uniconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-uniconnect_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password_dev}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - uniconnect-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: uniconnect-backend
    command: sh -c "pnpm install && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME:-uniconnect_dev}
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres_password_dev}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_secret_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_secret_refresh}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/services:/app/services
      - ./backend/shared:/app/shared
      - ./backend/gateway:/app/gateway
    depends_on:
      db:
        condition: service_healthy
    networks:
      - uniconnect-network

  frontend:
    image: node:20-alpine
    container_name: uniconnect-frontend
    working_dir: /app
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://backend:3000/api/v1}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-https://your-supabase-project.supabase.co}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY:-your_supabase_anon_key_here}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB: ${EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB:-your_google_client_id_web.apps.googleusercontent.com}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS: ${EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS:-your_google_client_id_ios.apps.googleusercontent.com}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID_ANDROID: ${EXPO_PUBLIC_GOOGLE_CLIENT_ID_ANDROID:-your_google_client_id_android.apps.googleusercontent.com}
    volumes:
      - ./frontend:/app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    command: sh -c "npm install && npm run start -- --host lan"
    depends_on:
      - backend
    networks:
      - uniconnect-network

volumes:
  db-data:
    driver: local

networks:
  uniconnect-network:
    driver: bridge
